<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Lumère</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0F0F0F;--pearl:#FAF8F4;--white:#fff;--sage:#5C8C7A;--hair:#E5E2DC;--ash:#888;}
body{background:var(--pearl);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
nav{height:60px;background:rgba(250,248,244,.96);border-bottom:1px solid var(--hair);display:flex;align-items:center;padding:0 32px;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;cursor:pointer;}
.nav-logo span{font-style:italic;color:var(--sage);}
.confirmed-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;}
.confirmed-card{max-width:520px;width:100%;text-align:center;}
.check-ring{width:80px;height:80px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:32px;color:#fff;}
.c-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,42px);font-weight:900;margin-bottom:14px;}
.c-title em{font-style:italic;color:var(--sage);}
.c-sub{font-size:15.5px;color:var(--ash);line-height:1.7;margin-bottom:28px;}
.order-chip{display:inline-block;background:var(--white);border:1.5px solid var(--hair);padding:12px 24px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);margin-bottom:28px;}
.c-note{font-size:13px;color:var(--ash);margin-bottom:36px;}
.cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-track{background:var(--sage);color:#fff;padding:13px 28px;font-size:14px;font-weight:600;border:none;cursor:pointer;}
.btn-track:hover{background:#4a7565;}
.btn-shop{background:none;border:1.5px solid var(--hair);color:var(--ash);padding:13px 28px;font-size:14px;font-weight:500;cursor:pointer;}
.btn-shop:hover{border-color:var(--ink);color:var(--ink);}
</style>
</head>
<body>
<nav><div class="nav-logo" onclick="location.href='index.html'">Lum<span>è</span>re</div></nav>
<div class="confirmed-wrap">
  <div class="confirmed-card">
    <div class="check-ring">✓</div>
    <h1 class="c-title">Order <em>confirmed.</em></h1>
    <p class="c-sub">Your Lumère formulas are being packed. You'll receive a shipping confirmation with a tracking number once your order leaves our Delhi warehouse.</p>
    <div class="order-chip" id="orderChip">Loading…</div>
    <p class="c-note">A GST invoice has been emailed to your address.</p>
    <div class="cta-row">
      <button class="btn-track" id="trackBtn">Track my order</button>
      <button class="btn-shop" onclick="location.href='shop.html'">Continue shopping</button>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script>
const p=new URLSearchParams(location.search);
const oid=p.get('order_id')||'LUM-XXXXXX';
document.getElementById('orderChip').textContent='Order ID: '+oid;
document.getElementById('trackBtn').onclick=()=>location.href='track.html?order_id='+oid;
</script>
</body>
</html>
