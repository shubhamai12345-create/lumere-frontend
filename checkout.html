<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Lumère</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0F0F0F;--pearl:#FAF8F4;--white:#fff;--sage:#5C8C7A;--gold:#B8864E;--hair:#E5E2DC;--ash:#888;}
body{background:var(--pearl);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(250,248,244,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);display:flex;align-items:center;}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;cursor:pointer;}
.nav-logo span{font-style:italic;color:var(--sage);}
.secure-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ash);letter-spacing:.08em;}
.container{max-width:1100px;margin:0 auto;padding:0 32px;}
.checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:40px;padding:96px 0 80px;align-items:start;}
.co-section-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--hair);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:0;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:12px;font-weight:600;color:var(--ash);letter-spacing:.04em;text-transform:uppercase;}
.form-group input,.form-group select{padding:12px 14px;border:1.5px solid var(--hair);background:var(--white);font-size:14.5px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;width:100%;}
.form-group input:focus,.form-group select:focus{border-color:var(--sage);}
.form-group input::placeholder{color:#bbb;}
.payment-section{margin-top:32px;}
.payment-opts{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.payment-opt{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1.5px solid var(--hair);cursor:pointer;transition:border-color .2s;}
.payment-opt.selected,.payment-opt:hover{border-color:var(--sage);}
.payment-opt input[type=radio]{accent-color:var(--sage);width:16px;height:16px;}
.payment-opt-label{font-size:14.5px;font-weight:500;}
.payment-opt-sub{font-size:12px;color:var(--ash);margin-top:2px;}
.order-sidebar{background:var(--white);border:1px solid var(--hair);padding:28px;position:sticky;top:80px;}
.os-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:18px;}
.os-items{border-bottom:1px solid var(--hair);padding-bottom:16px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;}
.os-item{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ash);}
.os-item strong{color:var(--ink);}
.os-row{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ash);margin-bottom:10px;}
.os-total{display:flex;justify-content:space-between;font-size:17px;font-weight:700;border-top:2px solid var(--ink);padding-top:14px;margin-top:4px;margin-bottom:20px;}
.btn-pay{width:100%;padding:16px;background:var(--sage);color:#fff;font-size:15px;font-weight:700;letter-spacing:.04em;border:none;cursor:pointer;transition:background .2s;}
.btn-pay:hover{background:#4a7565;}
.btn-pay:disabled{background:#ccc;cursor:not-allowed;}
.secure-note{text-align:center;margin-top:12px;font-size:11.5px;color:var(--ash);font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
.eta-note{font-size:12.5px;color:var(--sage);margin-top:8px;min-height:16px;}
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--ink);color:#fff;padding:14px 22px;font-size:13.5px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:900px){.checkout-layout{grid-template-columns:1fr;}.form-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.container{padding:0 20px;}.checkout-layout{padding:80px 0 60px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo" onclick="location.href='index.html'">Lum<span>è</span>re</div>
    <span class="secure-label">🔒 Secure checkout</span>
  </div>
</nav>
<div class="container">
  <div class="checkout-layout">
    <div class="co-form">
      <div class="co-section-title">Delivery details</div>
      <div class="form-grid">
        <div class="form-group"><label>First name *</label><input id="firstName" placeholder="Shubham" required></div>
        <div class="form-group"><label>Last name *</label><input id="lastName" placeholder="Pandey" required></div>
        <div class="form-group full"><label>Email address *</label><input id="email" type="email" placeholder="you@email.com" required></div>
        <div class="form-group full"><label>Phone number *</label><input id="phone" type="tel" placeholder="9XXXXXXXXX" maxlength="10" required></div>
        <div class="form-group full"><label>Address line 1 *</label><input id="addr1" placeholder="Flat / house number, building, street" required></div>
        <div class="form-group full"><label>Address line 2</label><input id="addr2" placeholder="Colony, landmark (optional)"></div>
        <div class="form-group"><label>City *</label><input id="city" placeholder="New Delhi" required></div>
        <div class="form-group"><label>Pincode *</label><input id="pincode" placeholder="110001" maxlength="6" required oninput="fetchETA()"></div>
        <div class="form-group full"><label>State *</label>
          <select id="state">
            <option value="">Select state</option>
            <option>Delhi</option><option>Maharashtra</option><option>Karnataka</option><option>Tamil Nadu</option>
            <option>Uttar Pradesh</option><option>Rajasthan</option><option>Haryana</option><option>Punjab</option>
            <option>Gujarat</option><option>West Bengal</option><option>Telangana</option><option>Kerala</option>
            <option>Madhya Pradesh</option><option>Andhra Pradesh</option><option>Bihar</option><option>Jharkhand</option>
          </select>
        </div>
      </div>
      <div class="eta-note" id="etaNote"></div>
      <div class="payment-section">
        <div class="co-section-title">Payment method</div>
        <div class="payment-opts">
          <div class="payment-opt selected" id="opt-prepaid" onclick="selectPay('prepaid')">
            <input type="radio" name="pay" value="prepaid" checked>
            <div><div class="payment-opt-label">💳 UPI / Card / Net Banking</div><div class="payment-opt-sub">Secure payment via Razorpay</div></div>
          </div>
          <div class="payment-opt" id="opt-cod" onclick="selectPay('cod')">
            <input type="radio" name="pay" value="cod">
            <div><div class="payment-opt-label">💵 Cash on Delivery</div><div class="payment-opt-sub">Pay when your order arrives</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="order-sidebar">
      <div class="os-title">Your Order</div>
      <div class="os-items" id="osItems"></div>
      <div id="osTotals"></div>
      <button class="btn-pay" id="payBtn" onclick="placeOrder()">Place Order →</button>
      <div class="secure-note">🔒 Razorpay · 256-bit SSL</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script>
let selPay='prepaid';
function selectPay(m){
  selPay=m;
  document.querySelectorAll('.payment-opt').forEach(el=>el.classList.remove('selected'));
  document.getElementById('opt-'+m).classList.add('selected');
  document.querySelector(`input[value="${m}"]`).checked=true;
}
function renderSidebar(){
  const cart=getCart(); updateCartCount();
  const sub=getCartTotal(),gst=Math.round(sub*.18),total=sub+gst;
  document.getElementById('osItems').innerHTML=cart.map(i=>`<div class="os-item"><span>${i.name.split('+')[0].trim()} ×${i.qty}</span><span><strong>₹${i.price*i.qty}</strong></span></div>`).join('');
  document.getElementById('osTotals').innerHTML=`
    <div class="os-row"><span>Subtotal</span><span>₹${sub}</span></div>
    <div class="os-row"><span>GST (18%)</span><span>₹${gst}</span></div>
    <div class="os-row"><span>Shipping</span><span style="color:var(--sage)">Free</span></div>
    <div class="os-total"><span>Total</span><span>₹${total}</span></div>`;
}
async function fetchETA(){
  const pin=document.getElementById('pincode').value.trim();
  if(pin.length!==6)return;
  try{const r=await fetch(`${API_BASE}/api/shipping/estimate/${pin}`);const d=await r.json();document.getElementById('etaNote').textContent='🚚 '+(d.message||`Delivered in ${d.air_days} business days`);}
  catch{document.getElementById('etaNote').textContent='🚚 3–5 business days pan-India';}
}
function gf(id){return document.getElementById(id)?.value?.trim()||'';}
function validate(){
  const req=['firstName','email','phone','addr1','city','pincode','state'];
  for(const f of req){if(!gf(f)){showToast('Please fill all required fields');return false;}}
  if(gf('phone').length!==10){showToast('Enter a valid 10-digit phone number');return false;}
  if(!getCart().length){showToast('Your cart is empty');return false;}
  return true;
}
async function placeOrder(){
  if(!validate())return;
  const btn=document.getElementById('payBtn');
  btn.disabled=true;btn.textContent='Processing…';
  const cart=getCart();const sub=getCartTotal();const gst=Math.round(sub*.18);const total=sub+gst;
  const payload={
    customer_name:`${gf('firstName')} ${gf('lastName')}`,customer_email:gf('email'),
    customer_phone:gf('phone'),address_line1:gf('addr1'),address_line2:gf('addr2')||null,
    city:gf('city'),state:gf('state'),pincode:gf('pincode'),
    items:cart.map(i=>({product_id:i.id,name:i.name,qty:i.qty,price:i.price})),
    payment_method:selPay
  };
  try{
    const res=await fetch(`${API_BASE}/api/orders/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const order=await res.json();
    if(selPay==='cod'){
      saveCart([]);location.href=`order-confirmed.html?order_id=${order.order_id}&method=cod`;return;
    }
    const rzp=new Razorpay({
      key:window.__RAZORPAY_KEY__||'rzp_test_T9QhGXTbjhJxV1',
      amount:total*100,currency:'INR',name:'Lumère',
      description:'Active skincare, delivered.',
      order_id:order.razorpay_order_id,
      handler:async(resp)=>{
        const v=await fetch(`${API_BASE}/api/payments/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:order.order_id,...resp})});
        if(v.ok){saveCart([]);location.href=`order-confirmed.html?order_id=${order.order_id}&method=prepaid`;}
      },
      prefill:{name:payload.customer_name,email:payload.customer_email,contact:payload.customer_phone},
      theme:{color:'#5C8C7A'}
    });
    rzp.open();
  }catch(e){showToast('Something went wrong. Please try again.');console.error(e);}
  finally{btn.disabled=false;btn.textContent='Place Order →';}
}
renderSidebar();
</script>
</body>
</html>
