<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Lumère</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0F0F0F;--ink2:#1E1E1E;--white:#fff;--pearl:#FAF8F4;--sage:#5C8C7A;--gold:#B8864E;--ash:#888;--hair:#E5E2DC;}
body{background:var(--pearl);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
nav{position:sticky;top:0;z-index:100;height:60px;background:rgba(250,248,244,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);display:flex;align-items:center;}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;cursor:pointer;}
.nav-logo span{font-style:italic;color:var(--sage);}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ash);}
.cart-pill{width:38px;height:38px;border:1.5px solid var(--hair);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;position:relative;}
.cart-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--sage);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;border-radius:50%;}
.container{max-width:1200px;margin:0 auto;padding:0 32px;}
.breadcrumb{padding:20px 0;font-size:13px;color:var(--ash);}
.breadcrumb a{color:var(--sage);}
.product-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;padding:40px 0 96px;align-items:start;}
/* Visual */
.pl-visual{position:sticky;top:80px;}
.pl-visual-card{background:var(--ink2);aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.pl-visual-card::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(92,140,122,.15) 0,transparent 60%);top:50%;left:50%;transform:translate(-50%,-50%);}
.bottle-wrap{text-align:center;position:relative;z-index:1;}
.bottle{width:80px;height:130px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px 8px 16px 16px;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;padding:10px 8px;position:relative;}
.bottle-cap{width:24px;height:10px;border-radius:3px 3px 0 0;background:var(--accent,#5C8C7A);margin-bottom:8px;flex:none;}
.bottle-label{font-family:'IBM Plex Mono',monospace;font-size:5.5px;font-weight:600;color:rgba(255,255,255,.7);text-align:center;line-height:1.6;letter-spacing:.05em;}
.bottle-name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.08em;}
/* Info */
.pl-kicker{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:10px;}
.pl-name{font-family:'IBM Plex Mono',monospace;font-size:clamp(20px,2.5vw,28px);font-weight:600;line-height:1.3;color:var(--ink);margin-bottom:16px;}
.pl-desc{font-size:16px;line-height:1.7;color:var(--ash);margin-bottom:28px;}
.price-row{display:flex;align-items:baseline;gap:14px;margin-bottom:28px;}
.pl-price{font-size:32px;font-weight:700;}
.pl-mrp{font-size:18px;color:var(--ash);text-decoration:line-through;}
.pl-vol{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ash);}
.qty-add{display:flex;gap:12px;align-items:center;margin-bottom:20px;}
.qty-wrap{display:flex;align-items:center;gap:0;border:1.5px solid var(--hair);}
.qty-btn{width:38px;height:44px;background:none;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{background:var(--pearl);}
.qty-num{width:44px;text-align:center;font-weight:600;font-size:15px;}
.btn-cart{flex:1;background:var(--ink);color:#fff;padding:0 28px;height:44px;font-size:14px;font-weight:600;letter-spacing:.04em;border:none;cursor:pointer;transition:background .2s;}
.btn-cart:hover{background:var(--sage);}
.delivery-note{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--sage);background:rgba(92,140,122,.08);padding:10px 14px;margin-bottom:32px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px;}
.stat-box{border:1.5px solid var(--hair);padding:16px;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ash);margin-bottom:5px;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--ink);}
.pl-section{padding:24px 0;border-top:1px solid var(--hair);}
.pl-section h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:14px;}
.tags-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.tag{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:5px 13px;border:1px solid var(--hair);color:var(--ash);}
.inci-text{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ash);line-height:1.9;}
.how-text{font-size:15px;color:var(--ash);line-height:1.75;}
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--ink);color:#fff;padding:14px 22px;font-size:13.5px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:900px){.product-layout{grid-template-columns:1fr;gap:40px;}.pl-visual{position:relative;top:0;}}
@media(max-width:600px){.nav-links{display:none;}.container{padding:0 20px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo" onclick="location.href='index.html'">Lum<span>è</span>re</div>
    <ul class="nav-links"><li><a href="shop.html">Shop</a></li><li><a href="quiz.html">Skin Quiz</a></li></ul>
    <div class="cart-pill" onclick="location.href='cart.html'">🛒<span class="cart-badge" id="cartCount"></span></div>
  </div>
</nav>
<div class="container">
  <div class="breadcrumb"><a href="shop.html">Shop</a> → <span id="bc"></span></div>
  <div class="product-layout" id="productLayout"></div>
</div>
<div class="toast" id="toast"></div>
<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script>
const id=new URLSearchParams(location.search).get('id');
const p=PRODUCTS.find(x=>x.id===id);
updateCartCount();
if(!p){
  document.getElementById('productLayout').innerHTML='<div style="padding:80px 0;color:#888">Product not found. <a href="shop.html" style="color:#5C8C7A">← Back to shop</a></div>';
}else{
  document.title=p.name+' — Lumère';
  document.getElementById('bc').textContent=p.name;
  let qty=1;
  function upQty(){document.getElementById('qn').textContent=qty;}
  document.getElementById('productLayout').innerHTML=`
  <div class="pl-visual">
    <div class="pl-visual-card">
      <div class="bottle-wrap">
        <div class="bottle">
          <div class="bottle-cap" style="background:${p.accent}"></div>
          <div class="bottle-label">${p.active.split(',')[0].trim()}</div>
        </div>
        <div class="bottle-name">Lumère</div>
      </div>
    </div>
  </div>
  <div class="pl-info">
    <div class="pl-kicker">${p.tagline}</div>
    <div class="pl-name">${p.name}</div>
    <p class="pl-desc">${p.desc}</p>
    <div class="price-row">
      <span class="pl-price">₹${p.price}</span>
      <span class="pl-mrp">₹${p.mrp}</span>
      <span class="pl-vol">${p.volume}</span>
    </div>
    <div class="qty-add">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="if(qty>1){qty--;upQty();}">−</button>
        <span class="qty-num" id="qn">1</span>
        <button class="qty-btn" onclick="qty++;upQty();">+</button>
      </div>
      <button class="btn-cart" onclick="addToCart('${p.id}',qty);location.href='cart.html'">Add to cart</button>
    </div>
    <div class="delivery-note">📦 Free delivery · COD available · Dispatched from Delhi in 1–2 days</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Concentration</div><div class="stat-val">${p.active.split(',')[0].trim()}</div></div>
      <div class="stat-box"><div class="stat-label">pH range</div><div class="stat-val">${p.ph}</div></div>
      <div class="stat-box"><div class="stat-label">Size</div><div class="stat-val">${p.volume}</div></div>
      <div class="stat-box"><div class="stat-label">Supply</div><div class="stat-val">~90 days</div></div>
    </div>
    <div class="pl-section"><h3>Best for</h3><div class="tags-wrap">${p.skintypes.map(s=>`<span class="tag">${s}</span>`).join('')}</div></div>
    <div class="pl-section"><h3>Targets</h3><div class="tags-wrap">${p.concerns.map(c=>`<span class="tag">${c}</span>`).join('')}</div></div>
    <div class="pl-section"><h3>How to use</h3><p class="how-text">${p.howToUse}</p></div>
    <div class="pl-section"><h3>Full INCI</h3><div class="inci-text">${p.inci}</div></div>
  </div>`;
}
</script>
</body>
</html>
