<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumère — Product</title>
<link rel="stylesheet" href="styles/global.css">
<style>
.product-layout{display:grid;grid-template-columns:1fr 1fr;gap:56px;padding:60px 0 80px;align-items:start;}
.pl-visual{position:sticky;top:88px;}
.pl-vis-card{height:440px;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:40px;}
.pl-bottle-lg{width:100px;height:160px;background:var(--white);border-radius:12px 12px 24px 24px;border:2px solid var(--hair);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 10px;box-shadow:0 8px 40px rgba(26,24,20,.12);}
.pl-cap-lg{width:30px;height:12px;border-radius:4px 4px 0 0;margin-bottom:6px;flex:none;}
.pl-label-lg{width:100%;background:var(--pearl);border-radius:4px;padding:6px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:600;color:var(--ink);line-height:1.5;}
.pl-info{padding-top:8px;}
.pl-tagline{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);margin-bottom:10px;}
.pl-name{font-family:'IBM Plex Mono',monospace;font-size:clamp(22px,2.5vw,30px);font-weight:600;line-height:1.25;margin-bottom:16px;}
.pl-desc{font-size:16px;color:var(--ink-soft);line-height:1.65;margin-bottom:28px;}
.pl-price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:24px;}
.pl-price{font-size:26px;font-weight:700;}
.pl-mrp{font-size:16px;color:var(--ash);text-decoration:line-through;}
.pl-vol{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ash);margin-left:4px;}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.qty-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--hair);background:none;cursor:pointer;font-size:18px;}
.qty-btn:hover{background:var(--pearl);}
.qty-num{font-weight:600;font-size:16px;min-width:24px;text-align:center;}
.add-btn{flex:1;padding:15px;border-radius:100px;background:var(--ink);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;}
.add-btn:hover{background:var(--sage);}
.pl-section{margin-top:32px;padding-top:28px;border-top:1px solid var(--hair);}
.pl-section h3{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:14px;}
.pl-skins,.pl-concerns{display:flex;gap:8px;flex-wrap:wrap;}
.pl-tag{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:5px 12px;border-radius:100px;background:var(--sage-lt);color:var(--sage);border:1px solid rgba(122,158,148,.3);}
.inci-text{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);line-height:1.8;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-box{background:var(--pearl);border-radius:10px;border:1px solid var(--hair);padding:16px;}
.stat-box .sl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ash);margin-bottom:5px;}
.stat-box .sv{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--sage);}
@media(max-width:900px){.product-layout{grid-template-columns:1fr;gap:30px;}.pl-visual{position:relative;top:0;}.pl-vis-card{height:280px;}}
</style>
</head>
<body>
<nav>
  <div class="wrap">
    <div class="nav-logo" onclick="location.href='index.html'">Lum<span>è</span>re</div>
    <ul class="nav-links"><li><a href="shop.html">Shop</a></li><li><a href="quiz.html">Skin Quiz</a></li></ul>
    <div class="nav-actions"><div class="cart-icon" onclick="location.href='cart.html'" id="cartBtn">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></div></div>
  </div>
</nav>

<div class="wrap">
  <p style="padding:20px 0;font-size:13.5px;color:var(--ash);"><a href="shop.html" style="color:var(--sage)">Shop</a> → <span id="breadcrumb"></span></p>
  <div class="product-layout" id="productLayout"></div>
</div>
<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script>
const params = new URLSearchParams(location.search);
const productId = params.get('id');
const p = PRODUCTS.find(pr => pr.id === productId);
updateCartCount();

if (!p) {
  document.getElementById('productLayout').innerHTML = '<div style="padding:60px 0;color:var(--ash);">Product not found. <a href="shop.html">Back to shop →</a></div>';
} else {
  document.title = p.name + ' — Lumère';
  document.getElementById('breadcrumb').textContent = p.name.split('+')[0].trim();
  let qty = 1;
  function renderQty() { document.getElementById('qtyNum').textContent = qty; }

  document.getElementById('productLayout').innerHTML = `
    <div class="pl-visual">
      <div class="pl-vis-card" style="background:${p.cardBg}">
        <div class="pl-bottle-lg">
          <div class="pl-cap-lg" style="background:${p.capColor}"></div>
          <div class="pl-label-lg">${p.active}</div>
        </div>
      </div>
    </div>
    <div class="pl-info">
      <div class="pl-tagline">${p.tagline}</div>
      <div class="pl-name">${p.name}</div>
      <p class="pl-desc">${p.desc}</p>
      <div class="pl-price-row"><span class="pl-price">₹${p.price}</span><span class="pl-mrp">₹${p.mrp}</span><span class="pl-vol">· ${p.volume}</span></div>
      <div class="qty-row">
        <button class="qty-btn" onclick="if(qty>1){qty--;renderQty();}">−</button>
        <span class="qty-num" id="qtyNum">1</span>
        <button class="qty-btn" onclick="qty++;renderQty();">+</button>
        <button class="add-btn" onclick="addToCart('${p.id}',qty)">Add to cart</button>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="sl">Concentration</div><div class="sv">${p.active.split(',')[0].trim()}</div></div>
        <div class="stat-box"><div class="sl">pH range</div><div class="sv">${p.ph}</div></div>
        <div class="stat-box"><div class="sl">Size</div><div class="sv">${p.volume}</div></div>
        <div class="stat-box"><div class="sl">Supply</div><div class="sv">~90 days</div></div>
      </div>
      <div class="pl-section"><h3 class="serif">Best for skin types</h3><div class="pl-skins">${p.skintypes.map(s=>`<span class="pl-tag">${s}</span>`).join('')}</div></div>
      <div class="pl-section"><h3 class="serif">Targets</h3><div class="pl-concerns">${p.concerns.map(c=>`<span class="pl-tag">${c}</span>`).join('')}</div></div>
      <div class="pl-section"><h3 class="serif">How to use</h3><p style="font-size:15px;color:var(--ink-soft);line-height:1.65;">${p.howToUse}</p></div>
      <div class="pl-section"><h3 class="serif">Full INCI list</h3><div class="inci-text">${p.inci}</div></div>
    </div>`;
}
</script>
</body>
</html>
