<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order — Lumère</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0F0F0F;--white:#fff;--pearl:#FAF8F4;--sage:#5C8C7A;--ash:#888;--hair:#E5E2DC;}
body{background:var(--pearl);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:100;height:60px;background:rgba(250,248,244,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);display:flex;align-items:center;}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;cursor:pointer;}
.nav-logo span{font-style:italic;color:var(--sage);}
.wrap{max-width:640px;margin:0 auto;padding:64px 32px 80px;}
.kicker{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:12px;display:block;}
h1{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,44px);font-weight:700;margin-bottom:8px;}
h1 em{font-style:italic;color:var(--sage);}
.sub{font-size:15px;color:var(--ash);margin-bottom:28px;}
.search-row{display:flex;gap:0;margin-bottom:40px;}
.search-row input{flex:1;padding:13px 16px;border:1.5px solid var(--hair);font-size:15px;font-family:'Inter',sans-serif;outline:none;border-right:none;}
.search-row input:focus{border-color:var(--sage);}
.search-row button{padding:13px 24px;background:var(--ink);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.search-row button:hover{background:var(--sage);}
.track-result{background:var(--white);border:1.5px solid var(--hair);padding:28px;}
.tr-status{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-bottom:6px;}
.tr-courier{font-size:14px;color:var(--ash);margin-bottom:20px;}
.tr-eta{font-size:14px;color:var(--sage);font-weight:600;margin-bottom:20px;}
.tr-events{display:flex;flex-direction:column;}
.tr-ev{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--hair);}
.tr-ev:last-child{border-bottom:none;}
.tr-dot{width:10px;height:10px;border-radius:50%;background:var(--sage);flex:none;margin-top:5px;}
.tr-ev-msg{font-size:14.5px;color:var(--ink);margin-bottom:3px;}
.tr-ev-time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ash);}
.tr-empty{color:var(--ash);font-size:15px;text-align:center;padding:28px;}
@media(max-width:600px){.wrap{padding:48px 20px;}}
</style>
</head>
<body>
<nav><div class="nav-inner"><div class="nav-logo" onclick="location.href='index.html'">Lum<span>è</span>re</div></div></nav>
<div class="wrap">
  <span class="kicker">Order status</span>
  <h1>Track your <em>order</em></h1>
  <p class="sub">Enter the AWB number from your shipping confirmation SMS, or your Order ID.</p>
  <div class="search-row">
    <input type="text" id="awbInput" placeholder="AWB number or Order ID">
    <button onclick="track()">Track</button>
  </div>
  <div id="result"></div>
</div>
<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script>
const pre=new URLSearchParams(location.search).get('order_id');
if(pre){document.getElementById('awbInput').value=pre;setTimeout(track,300);}
async function track(){
  const awb=document.getElementById('awbInput').value.trim();
  if(!awb)return;
  const r=document.getElementById('result');
  r.innerHTML='<div class="tr-empty">Fetching tracking info…</div>';
  try{
    const res=await fetch(`${API_BASE}/api/shipping/track/${awb}`);
    if(!res.ok)throw new Error();
    const d=await res.json();
    r.innerHTML=`<div class="track-result">
      <div class="tr-status">${d.status||'In transit'}</div>
      <div class="tr-courier">Courier: ${d.courier||'—'} · AWB: ${d.awb||awb}</div>
      ${d.estimated_delivery?`<div class="tr-eta">📦 Expected: ${d.estimated_delivery}</div>`:''}
      <div class="tr-events">
        ${(d.events||[]).map(ev=>`<div class="tr-ev"><div class="tr-dot"></div><div><div class="tr-ev-msg">${ev.activity||ev.status||''}</div><div class="tr-ev-time">${ev.date||ev.timestamp||''} ${ev.location?'· '+ev.location:''}</div></div></div>`).join('')||'<div class="tr-empty">No events yet. Check back once dispatched.</div>'}
      </div>
    </div>`;
  }catch{r.innerHTML='<div class="track-result"><div class="tr-empty">No tracking info found. If your order was placed recently, it may not be dispatched yet. You\'ll receive an SMS with your AWB once shipped.</div></div>';}
}
</script>
</body>
</html>
